- name: Create ec2 and r53 records
  hosts: local
  connection: local
  vars: 
    instances:
      - mysql
      - backend
      - frontend
    subnet_id: subnet-05160d290859e4211
    sg_id: sg-0c05c24867a0de439
    ami_id: ami-0220d79f3f480ecf5
  tasks:
    - name: Create ec2 
      amazon.aws_ec2_instance:
        name: "{{ item }}"
        vpc_subnet_id: "{{ subnet_id }}"
        instance_type: t3.micro 
        security_group: "{{ sg_id }}"
        image_id: "{{ ami_id }}"
        tags:
          Name: "{{ item }}"
      loop: "{{ instances }}"

